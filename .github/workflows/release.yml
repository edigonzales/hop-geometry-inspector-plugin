name: Release

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"

      - name: Build plugin ZIP
        shell: bash
        run: mvn -U -B -ntp -DskipTests -pl assemblies/assemblies-hop-geometry-inspector -am package

      - name: Validate packaged ZIP
        id: asset
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t zip_files < <(find assemblies/assemblies-hop-geometry-inspector/target -maxdepth 1 -type f -name '*.zip' | sort)

          if [[ ${#zip_files[@]} -ne 1 ]]; then
            echo "Expected exactly 1 ZIP in assemblies/assemblies-hop-geometry-inspector/target, found ${#zip_files[@]}"
            printf '%s\n' "${zip_files[@]}"
            exit 1
          fi

          zip_path="${zip_files[0]}"
          zip_name="$(basename "$zip_path")"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"
          ls -lh "$zip_path"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          if-no-files-found: error
          path: ${{ steps.asset.outputs.zip_path }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: release-zip
          path: dist

      - name: Collect ZIP asset
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          mapfile -t zip_files < <(find dist -type f -name '*.zip' | sort)

          if [[ ${#zip_files[@]} -ne 1 ]]; then
            echo "Expected exactly 1 ZIP under dist/, found ${#zip_files[@]}"
            find dist -maxdepth 4 -type f -print || true
            exit 1
          fi

          zip_path="${zip_files[0]}"
          zip_name="$(basename "$zip_path")"
          cp "$zip_path" "release-assets/$zip_name"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"
          ls -la release-assets

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          zip_name="${{ steps.assets.outputs.zip_name }}"
          version="$(echo "$zip_name" | sed -E 's/^hop-geometry-inspector-plugin-([0-9A-Za-z.+_-]+)\.zip$/\1/')"
          if [[ -z "$version" || "$version" == "$zip_name" ]]; then
            echo "Could not resolve version from ZIP filename: $zip_name" >&2
            exit 1
          fi

          safe_version="${version//+/-}"
          timestamp="$(date -u +%Y%m%d-%H%M)"
          short_sha="${GITHUB_SHA::7}"
          tag="auto-v${safe_version}-${timestamp}-${short_sha}"
          name="Auto Release ${version} (${timestamp} UTC)"
          prerelease="false"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: release-assets/*.zip
